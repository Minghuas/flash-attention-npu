name: ❓ Usage Question
description: Ask a question or seek help with using flash-attention-npu.
title: "[QST]: "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: >
        #### Before submitting an issue, please make sure the issue hasn't been already open or addressed by searching through [existing issues](https://github.com/MinghuasLab/flash-attention-npu/issues).
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched the existing issues and discussions for a similar question.
          required: true
        - label: I have checked the README and available documentation.
          required: true
        - label: I have removed any sensitive information from logs or code snippets.
          required: true

  - type: textarea
    id: usage
    attributes:
      label: What are you trying to do?
      description: Describe your use case.

    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: What is your question or problem?
      description: Describe your question or the problem you encountered. Include any relevant error messages or unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (Optional)
      description: Provide your environment information if it is relevant to your question.
      value: |
        - Device (e.g., Ascend 910B):
        - CANN version:
        - Python version:
        - PyTorch version:
        - torch_npu version:
        - FlashAttention-NPU version:
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context that is relevant.
    validations:
      required: false